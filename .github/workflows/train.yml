name: Model Training

on:
  workflow_dispatch:

jobs:
  train:
    name: Retrain Churn Model

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest New Data
        run: |
          python -m src.data.ingest_data

      - name: Verify Processed Dataset
        run: |
          test -f data/processed/cleaned_telco.csv

      - name: Retrain Model
        run: |
          python -m src.models.train

      - name: Upload Trained Model
        uses: actions/upload-artifact@v4
        with:
          name: telecom-churn-model
          path: backend/artifacts/model.pkl

      - name: Upload MLflow Runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: backend/mlruns/